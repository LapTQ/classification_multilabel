# Cấu hình huấn luyện ResNet50 cho PA100K Multi-label Classification

# Thư mục chứa kết quả train (weights, logs, visualizations)
output_dir: "/home/laptq/classification_multilabel/outputs/train/v6.resnet50.pa100k"

model: "resnet50"

resume_path: null # Path tới thư mục run để resume (nếu có)

# Danh sách các class
classes:
  - "front"
  - "side"
  - "back"
  - "handbag"
  - "shoulderbag"
  - "backpack"
  - "holdobjectsinfront"

# Dữ liệu tập Train (Danh sách file .txt)
train_data:
  - "/home/laptq/classification_multilabel/outputs/train_data/classify_rgb_multilabel/pa100k_train.txt"

# Dữ liệu tập Val/Test (Danh sách file .txt)
val_data:
  - "/home/laptq/classification_multilabel/outputs/train_data/classify_rgb_multilabel/pa100k_val.txt"
  - "/home/laptq/classification_multilabel/outputs/train_data/classify_rgb_multilabel/pa100k_test.txt"

# Tham số Training
epochs: 50
batch_size: 64
lr: 1e-4
weight_decay: 1e-5
patience: 20
num_workers: 8
precision: 32

accelerator: "gpu"
devices: [2] # Sử dụng GPU 1, 2 (hoặc thay đổi cho phù hợp với hệ thống)

train_augment:
  # - SquarePad: {}
  - RandomHorizontalFlip: {}
  - RandAugment:
      num_ops: 4
      magnitude: 9
      interpolation: "BILINEAR"
  - Downscale:
      scale_range: [0.5, 0.5]
      p: 0.1
  - ChannelShuffle:
      p: 0.5
  # - GaussNoise:
  #     p: 0.1
  - ColorJitter:
      hue: 0.15
  - RandomGrayscale:
      p: 0.1
  - Resize:
      size: [256, 192]
  # - RandomResizedCrop:
  #     size: [224, 224]
  #     scale: [0.7, 1.0]
  - ToTensor: {}
  - Normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

val_augment:
  # - SquarePad: {}
  - Resize:
      size: [256, 192]
  - ToTensor: {}
  - Normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
