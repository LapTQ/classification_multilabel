# Cấu hình huấn luyện EfficientNetV2 cho Multi-label Classification

# Thư mục chứa kết quả train (weights, logs, visualizations)
output_dir: "models/checkpoints/fs26/classification_multilabel/v7.efficientnetv2m.cia+cia_gen+pa100k"

model: "efficientnetv2m"

resume_path: null # Path tới thư mục run để resume (nếu có)

# Danh sách các class
classes:
  - "handbag"       # 0
  - "shoulderbag"   # 1
  - "backpack"      # 2
  - "basket"        # 3
  - "cart"          # 4
  - "product"       # 5

# Dữ liệu tập Train (Danh sách file .txt)
train_data:
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/CIA_combined_with_geneated_editting.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/CIA_original.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/pa100k_train--no_HoldObjectsInFront--x0.5_negative.txt"

# Dữ liệu tập Val/Test (Danh sách file .txt)
val_data:
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/Satudora_test.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/pa100k_val--no_HoldObjectsInFront--x0.5_negative.txt"
  - "data/processed/fs26/train_data/classify_rgb_multilabel/person_attributes/pa100k_test--no_HoldObjectsInFront--x0.5_negative.txt"

# Tham số Training
epochs: 100
batch_size: 32
lr: 1e-5
weight_decay: 1e-5
patience: 20
num_workers: 8
precision: 32

accelerator: "gpu"
devices: [1] # Sử dụng GPU 0 (hoặc thay đổi cho phù hợp với hệ thống)

train_augment:
  # - SquarePad: {}
  - RandomHorizontalFlip: {}
  - RandAugment:
      num_ops: 4
      magnitude: 9
      interpolation: "BILINEAR"
  - Downscale:
      scale_range: [0.5, 0.5]
      p: 0.1
  - ChannelShuffle:
      p: 0.5
  # - GaussNoise:
  #     p: 0.1
  - ColorJitter:
      hue: 0.15
  - RandomGrayscale:
      p: 0.1
  - Resize:
      size: [256, 192]
  # - RandomResizedCrop:
  #     size: [224, 224]
  #     scale: [0.7, 1.0]
  - ToTensor: {}
  - Normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

val_augment:
  # - SquarePad: {}
  - Resize:
      size: [256, 192]
  - ToTensor: {}
  - Normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
